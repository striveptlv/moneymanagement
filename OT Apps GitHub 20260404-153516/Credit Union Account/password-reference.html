<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reference | Las Vegas School District Credit Union</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        color: #132033;
        background: linear-gradient(180deg, #f6f8fb 0%, #e8eef5 100%);
      }

      .card {
        width: min(100%, 560px);
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(19, 32, 51, 0.12);
        box-shadow: 0 20px 44px rgba(16, 34, 56, 0.12);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #5e6c7f;
      }

      h1,
      p {
        margin-top: 0;
      }

      .hint {
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(22, 80, 143, 0.08);
        border: 1px solid rgba(22, 80, 143, 0.12);
      }

      .site-credit {
        margin-top: 22px;
        text-align: center;
        font-size: 0.82rem;
        color: #6f7c8d;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Hard And Realistic Password Reference</p>
      <h1>Password Helper</h1>
      <p>Use this page only when the hard or realistic login asks you to look up the password separately.</p>
      <div class="hint">
        <strong>Password:</strong> Therapy
      </div>
      <p class="site-credit">Created by Strive Physical Therapy Las Vegas</p>
    </main>
  </body>
</html>
